<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f7fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="榆次天气">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icon-180.png">
  <title>榆次天气</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: rgba(255,255,255,.76);
      --solid: #fff;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0,0,0,.08);
      --blue: #007aff;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --shadow: 0 18px 48px rgba(20, 32, 60, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(0,122,255,.20), transparent 30%),
        radial-gradient(circle at 90% 8%, rgba(52,199,89,.18), transparent 28%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 60%, #eef2f8 100%);
    }

    .shell {
      width: min(100%, 440px);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 8px 2px 16px;
    }

    .place {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .refresh {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.75);
      font-size: 18px;
      box-shadow: 0 5px 20px rgba(20,32,60,.08);
    }

    .hero {
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 30px;
      padding: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .temp {
      font-size: 78px;
      line-height: .9;
      font-weight: 780;
      letter-spacing: 0;
    }

    .degree {
      font-size: 30px;
      color: var(--muted);
      vertical-align: top;
      margin-left: 2px;
    }

    .condition {
      margin-top: 10px;
      color: var(--muted);
      font-size: 16px;
    }

    .summary {
      text-align: right;
      padding-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .summary strong {
      display: block;
      color: var(--ink);
      font-size: 17px;
      margin-bottom: 2px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .metric {
      padding: 12px 10px;
      border-radius: 18px;
      background: rgba(245,247,251,.88);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metric strong {
      font-size: 15px;
    }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin: 22px 2px 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }

    .section-title small {
      color: var(--muted);
      font-size: 12px;
    }

    .days {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 1px 12px;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }

    .days::-webkit-scrollbar { display: none; }

    .day {
      flex: 0 0 104px;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 12px;
      min-height: 132px;
      background: rgba(255,255,255,.72);
      text-align: left;
      scroll-snap-align: start;
      transition: .16s ease;
    }

    .day.active {
      border-color: rgba(0,122,255,.55);
      background: rgba(0,122,255,.12);
      transform: translateY(-2px);
    }

    .date {
      color: var(--muted);
      font-size: 12px;
    }

    .emoji {
      font-size: 28px;
      margin: 10px 0 6px;
    }

    .desc {
      min-height: 36px;
      line-height: 1.3;
      font-size: 13px;
      font-weight: 760;
    }

    .rain {
      margin-top: 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 760;
    }

    .detail {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 18px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 12px 34px rgba(20,32,60,.08);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    .line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 9px 0;
      border-top: 1px solid rgba(0,0,0,.06);
      color: var(--muted);
      font-size: 14px;
    }

    .line:first-of-type { border-top: none; }
    .line strong { color: var(--ink); }

    .risk {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
      font-size: 24px;
      font-weight: 780;
    }

    .risk.low { color: var(--green); }
    .risk.mid { color: var(--orange); }
    .risk.high { color: var(--red); }

    .tip {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .loading, .error {
      padding: 38px 18px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .error strong {
      display: block;
      color: var(--red);
      font-size: 18px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <div class="place">山西晋中 · 榆次</div>
        <h1>榆次天气</h1>
      </div>
      <button class="refresh" id="refresh" aria-label="刷新">↻</button>
    </header>
    <main id="app" class="loading">正在获取最新天气...</main>
  </div>

  <script>
    const apiUrl = "https://api.open-meteo.com/v1/forecast?latitude=37.68&longitude=112.75&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum&timezone=Asia%2FShanghai&forecast_days=8";

    const weatherMap = {
      0: ["晴", "☀️"], 1: ["大部晴朗", "🌤️"], 2: ["局部多云", "⛅"], 3: ["阴", "☁️"],
      45: ["雾", "🌫️"], 48: ["雾凇", "🌫️"],
      51: ["小毛毛雨", "🌦️"], 53: ["中等毛毛雨", "🌦️"], 55: ["较强毛毛雨", "🌧️"],
      61: ["小雨", "🌧️"], 63: ["中雨", "🌧️"], 65: ["大雨", "🌧️"],
      71: ["小雪", "🌨️"], 73: ["中雪", "🌨️"], 75: ["大雪", "🌨️"],
      80: ["阵雨", "🌦️"], 81: ["较强阵雨", "🌧️"], 82: ["强阵雨", "🌧️"],
      95: ["雷暴", "⛈️"], 96: ["雷暴伴小冰雹", "⛈️"], 99: ["雷暴伴较强冰雹", "⛈️"]
    };

    let data;
    let selected = 1;

    function weather(code) {
      return weatherMap[code] || [`天气 ${code}`, "☁️"];
    }

    function round(value, digits = 0) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "暂无";
      const scale = Math.pow(10, digits);
      return String(Math.round(Number(value) * scale) / scale);
    }

    function dateLabel(date) {
      const d = new Date(date + "T00:00:00");
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function day(index) {
      const d = data.daily;
      return {
        date: d.time[index],
        code: d.weather_code[index],
        min: d.temperature_2m_min[index],
        max: d.temperature_2m_max[index],
        rain: d.precipitation_probability_max[index] ?? 0,
        amount: d.precipitation_sum[index] ?? 0
      };
    }

    function riskInfo(rain) {
      if (rain >= 60) return ["high", "建议带伞", "降雨概率较高，出门带伞，留意路面湿滑。"];
      if (rain >= 30) return ["mid", "留意降雨", "有一定降雨可能，外出前再看一眼天气。"];
      return ["low", "风险较低", "降雨风险较低，按日常出行准备即可。"];
    }

    function render(keepScrollLeft) {
      const app = document.getElementById("app");
      const current = data.current;
      const today = day(0);
      const selectedDay = day(selected);
      const currentWeather = weather(current.weather_code);
      const todayWeather = weather(today.code);
      const selectedWeather = weather(selectedDay.code);
      const risk = riskInfo(selectedDay.rain);

      app.className = "";
      app.innerHTML = `
        <section class="hero">
          <div class="hero-top">
            <div>
              <div class="temp">${round(current.temperature_2m)}<span class="degree">℃</span></div>
              <div class="condition">${currentWeather[1]} ${currentWeather[0]}</div>
            </div>
            <div class="summary">
              <strong>今日 ${todayWeather[0]}</strong>
              ${round(today.min)}℃ ~ ${round(today.max)}℃<br>
              降雨 ${round(today.rain)}%
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>体感</span><strong>${round(current.apparent_temperature)}℃</strong></div>
            <div class="metric"><span>湿度</span><strong>${round(current.relative_humidity_2m)}%</strong></div>
            <div class="metric"><span>风速</span><strong>${round(current.wind_speed_10m)} km/h</strong></div>
          </div>
        </section>

        <div class="section-title">
          <h2>未来 7 天</h2>
          <small>左右滑动，点击查看</small>
        </div>
        <section class="days">
          ${[1,2,3,4,5,6,7].map((i) => {
            const item = day(i);
            const info = weather(item.code);
            return `<button class="day ${i === selected ? "active" : ""}" data-day="${i}">
              <div class="date">${dateLabel(item.date)}</div>
              <div class="emoji">${info[1]}</div>
              <div class="desc">${info[0]}</div>
              <div class="rain">降雨 ${round(item.rain)}%</div>
            </button>`;
          }).join("")}
        </section>

        <section class="detail">
          <div class="card">
            <h3>${dateLabel(selectedDay.date)} · ${selectedWeather[0]}</h3>
            <div class="line"><span>温度</span><strong>${round(selectedDay.min)}℃ ~ ${round(selectedDay.max)}℃</strong></div>
            <div class="line"><span>降雨概率</span><strong>${round(selectedDay.rain)}%</strong></div>
            <div class="line"><span>预计降水</span><strong>${round(selectedDay.amount, 1)} mm</strong></div>
          </div>
          <div class="card">
            <div class="risk ${risk[0]}">${risk[1]}</div>
            <p class="tip">${risk[2]}</p>
          </div>
        </section>
      `;

      app.querySelectorAll(".day").forEach(button => {
        button.addEventListener("click", () => {
          const days = document.querySelector(".days");
          const scrollLeft = days ? days.scrollLeft : 0;
          selected = Number(button.dataset.day);
          render(scrollLeft);
        });
      });

      if (typeof keepScrollLeft === "number") {
        const days = document.querySelector(".days");
        if (days) {
          days.scrollLeft = keepScrollLeft;
          const active = days.querySelector(".day.active");
          if (active) {
            const left = active.offsetLeft - days.offsetLeft;
            const right = left + active.offsetWidth;
            if (left < days.scrollLeft || right > days.scrollLeft + days.clientWidth) {
              active.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
            }
          }
        }
      }
    }

    async function load() {
      const app = document.getElementById("app");
      app.className = "loading";
      app.textContent = "正在获取最新天气...";
      try {
        const response = await fetch(apiUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        data = await response.json();
        selected = 1;
        render();
      } catch (error) {
        app.className = "error";
        app.innerHTML = `<strong>天气获取失败</strong>${error.message}`;
      }
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
